name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build-and-upload:
    name: Build and upload release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: |
          # Run lint, test and build script
          npm install
          npm run lint
          npm run test
          npm run build

          VERSION=${{ github.event.release.tag_name }}
          echo "Publishing version: $VERSION"

          # Update package.json version (this automatically removes v prefix)
          npm version $VERSION --no-git-tag-version --allow-same-version

          if [[ "$VERSION" == *"-"* ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi
          echo "Using npm tag: $NPM_TAG"

          # Publish to npm
          npm publish --provenance --access public --tag $NPM_TAG
